<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1a110d" />
    <meta name="description" content="Artisan sandwiches, fresh-baked breads, exclusive recipes, and online ordering from The Wich Doc — Parksville, BC." />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="restaurant" />
    <meta property="og:url" content="https://wichdocbakeshop.ca/" />
    <meta property="og:title" content="The 'Wich Doc | Artisan Bakery & Sandwich Shop" />
    <meta property="og:description" content="Artisan sandwiches, fresh-baked breads, and exclusive member recipes from The Wich Doc — Parksville, BC." />
    <meta property="og:image" content="https://wichdocbakeshop.ca/logo.png" />
    <meta property="og:site_name" content="The Wich Doc" />
    <meta property="og:locale" content="en_CA" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="The 'Wich Doc | Artisan Bakery & Sandwich Shop" />
    <meta name="twitter:description" content="Artisan sandwiches, fresh-baked breads, and exclusive member recipes from The Wich Doc — Parksville, BC." />
    <meta name="twitter:image" content="https://wichdocbakeshop.ca/logo.png" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Bakery",
      "name": "The Wich Doc",
      "alternateName": "Wich Doc Bake Shop",
      "url": "https://wichdocbakeshop.ca",
      "logo": "https://wichdocbakeshop.ca/logo.png",
      "image": "https://wichdocbakeshop.ca/logo.png",
      "description": "Artisan sandwiches, fresh-baked breads, and exclusive member recipes from Parksville, BC.",
      "telephone": "672-922-0970",
      "email": "chef@wichdocbakeshop.ca",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Parksville",
        "addressRegion": "BC",
        "addressCountry": "CA"
      },
      "openingHoursSpecification": [
        { "@type": "OpeningHoursSpecification", "dayOfWeek": ["Wednesday","Thursday","Friday","Saturday"], "opens": "11:00", "closes": "15:00" }
      ],
      "servesCuisine": ["Sandwiches", "Artisan Bread", "Pastries"],
      "priceRange": "$$",
      "sameAs": [
        "https://www.instagram.com/wichdocbakeshop/",
        "https://www.facebook.com/profile.php?id=100088206555550"
      ]
    }
    </script>

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Wich Doc" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <title>The 'Wich Doc | Artisan Bakery & Sandwich Shop</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Netlify Forms detection -->
    <form name="catering" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="date" name="date" />
      <input type="number" name="guests" />
      <input type="text" name="eventType" />
      <input type="text" name="location" />
      <input type="text" name="menuOptions" />
      <textarea name="notes"></textarea>
    </form>
    <script src="https://web.squarecdn.com/v1/square.js"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
